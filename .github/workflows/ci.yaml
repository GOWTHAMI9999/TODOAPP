name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test || echo "No tests"

      - name: Build Docker Image
        run: docker build -t todoapp .

      - name: Stop Old Container
        run: docker rm -f todoapp-container || true

      - name: Run New Container
        run: docker run -d -p 3000:3000 --name todoapp-container todoapp
